# Grafana Dashboard Provisioning

apiVersion: 1

providers:
  - name: 'ImoPanorama'
    orgId: 1
    folder: 'ImoPanorama'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
