name: imopanorama

# ============================================
# ImoPanorama - Docker Compose
# ============================================
# Usage:
#   cd docker
#   docker compose up -d
#
# Services Docker:
#   - postgres    : PostgreSQL 16 + pgvector/pg_trgm/unaccent/earthdistance (host port 5433 → container 5432)
#   - redis       : Cache / Sessions / Queue (port 6379)
#   - umami       : Analytics (port 3100)
#   - grafana     : Dashboards monitoring (port 3200)
#   - loki        : Agrégation de logs (port 3101)
#   - promtail    : Collecteur de logs
#   - uptime-kuma : Monitoring uptime (port 3300)
#
# Services natifs (VPS) :
#   - Next.js (PM2) → localhost:3000
# ============================================

services:

  # =====================
  # POSTGRES - Base de données principale
  # Image `pgvector/pgvector:pg16` = Postgres 16 officiel + extension vector déjà compilée
  # Les extensions pg_trgm / unaccent / earthdistance / btree_gin sont `contrib` (shippées avec Postgres),
  # il suffit de faire CREATE EXTENSION → voir ./postgres/init/01-extensions.sql (exécuté au 1er démarrage)
  # =====================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: imo-postgres
    restart: unless-stopped
    ports:
      # HOST:CONTAINER → 5433:5432 (Postgres écoute sur 5432 dans le conteneur, exposé sur 5433 côté host)
      # Évite le conflit avec un Postgres natif occupant déjà 5432.
      # Depuis l'app locale : DATABASE_URL=postgresql://postgres:root@localhost:5433/db_imo
      - "127.0.0.1:5433:5432"
    # env_file = lu relativement à ce fichier compose → robuste quel que soit le CWD
    # Contient POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB (voir docker/.env)
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_imo"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =====================
  # REDIS - Cache / Sessions / Queue
  # En prod VPS: peut être remplacé par redis natif (apt install redis-server)
  # =====================
  redis:
    image: redis:7-alpine
    container_name: imo-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
  # =====================
  # UMAMI - Analytics
  # Utilise le PostgreSQL natif du VPS (host.docker.internal)
  # =====================
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: imo-umami
    restart: unless-stopped
    ports:
      - "${UMAMI_PORT:-3100}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      TRACKER_SCRIPT_NAME: custom-analytics
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # =====================
  # GRAFANA - Dashboards & Monitoring
  # =====================
  grafana:
    image: grafana/grafana:latest
    container_name: imo-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3200}:3000"
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # =====================
  # LOKI - Log Aggregation
  # =====================
  loki:
    image: grafana/loki:3.4.3
    container_name: imo-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # =====================
  # PROMTAIL - Log Collector → Loki
  # =====================
  promtail:
    image: grafana/promtail:3.4.3
    container_name: imo-promtail
    restart: unless-stopped
    depends_on:
      - loki
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # =====================
  # UPTIME KUMA - Uptime Monitoring
  # =====================
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: imo-uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_PORT:-3300}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# =====================
# VOLUMES
# =====================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  uptime_kuma_data:
    driver: local
